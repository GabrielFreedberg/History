name: Daily history notification

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Send even if it is not currently 11pm America/Denver"
        required: false
        default: "true"
      date:
        description: "Optional MM-DD test date, for example 07-20"
        required: false
        default: ""
  schedule:
    # GitHub Actions cron is UTC. Running at both 05:00 and 06:00 UTC lets
    # the script send at 11pm America/Denver across daylight saving changes.
    - cron: "0 5,6 * * *"

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send history notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          USE_OPENAI_PODCAST_RANKING: ${{ vars.USE_OPENAI_PODCAST_RANKING || 'false' }}
          EVENT_INTEREST_KEYWORDS: ${{ vars.EVENT_INTEREST_KEYWORDS || 'war, crime, natural disasters, battles' }}
          DEBUG_MATCHING: ${{ vars.DEBUG_MATCHING || 'false' }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          FORCE_SEND: ${{ github.event.inputs.force || 'false' }}
          HISTORY_DATE: ${{ github.event.inputs.date }}
        run: python history_digest.py
