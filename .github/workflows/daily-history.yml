name: Daily history notification

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional MM-DD test date, for example 07-20"
        required: false
        default: ""
  schedule:
    # GitHub Actions cron is UTC. 04:38 UTC is 10:38pm America/Denver
    # during daylight saving time.
    - cron: "38 4 * * *"

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "date=${{ github.event.inputs.date || '' }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "UTC time:"
          date -u

      - name: Send history notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          USE_OPENAI_PODCAST_RANKING: ${{ vars.USE_OPENAI_PODCAST_RANKING || 'false' }}
          EVENT_INTEREST_KEYWORDS: ${{ vars.EVENT_INTEREST_KEYWORDS || 'war, crime, natural disasters, battles' }}
          DEBUG_MATCHING: ${{ vars.DEBUG_MATCHING || 'false' }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          HISTORY_DATE: ${{ github.event.inputs.date || '' }}
        run: python history_digest.py
